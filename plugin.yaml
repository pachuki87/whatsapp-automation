name: whatsapp_automation
# IMPORTANT: 'name' must exactly match the folder name in the a0-plugins index (plugins/whatsapp_automation/)
version: "1.0.0"
display_name: "WhatsApp Automation"
description: "Full WhatsApp Web automation with persistent Chrome sessions in headless mode. Allows sending messages, reading conversations, and monitoring chats without needing to scan the QR code every time."
author: "pachuki87"
license: "MIT"
repository: "https://github.com/pachuki87/whatsapp-automation"
homesite: "https://github.com/pachuki87/whatsapp-automation"
category: automation
tags:
  - whatsapp
  - automation
  - chrome
  - headless
  - messaging

dependencies:
  agent_zero:
    min_version: "1.0.0"
  tools_required:
    - code_execution_tool
    - chrome_devtools
  optional:
    - browser_agent

environment:
  os:
    - linux
    - docker
  browser:
    - chrome
    - chromium

installation:
  type: "simple"
  commands:
    - "mkdir -p /a0/usr/workdir/chrome-profile"
    - "chmod 755 /a0/usr/workdir/chrome-profile"

configuration:
  variables:
    - name: "CHROME_PROFILE_DIR"
      description: "Directory for the persistent Chrome profile"
      default: "/a0/usr/workdir/chrome-profile"
      required: true
    - name: "WHATSAPP_URL"
      description: "WhatsApp Web URL"
      default: "https://web.whatsapp.com"
      required: false
    - name: "DEBUG_PORT"
      description: "Chrome DevTools port"
      default: "9222"
      required: false

setup:
  description: "The plugin configures Chrome with a persistent profile that keeps the WhatsApp Web session active without needing to scan QR each time."
  steps:
    - "Verify Google Chrome is installed"
    - "Create persistent directory for the Chrome profile"
    - "Start Chrome with persistence flags"
    - "Scan QR code the first time"
    - "Verify that the session remains after reboots"

permissions:
  required:
    - "terminal_access"
    - "file_system_write"
    - "network_access"
  optional:
    - "screen_capture"

features:
  - name: "Persistent Session"
    description: "Keeps WhatsApp Web session active after system reboots"
  - name: "Message Automation"
    description: "Sends and receives messages automatically"
  - name: "Conversation Monitoring"
    description: "Monitors specific chats in real time"
  - name: "Headless Operation"
    description: "Works without graphical interface (headless mode)"
  - name: "Docker Compatible"
    description: "Compatible with Docker containers"
  - name: "Chrome DevTools Integration"
    description: "Integrates with Chrome DevTools MCP for advanced control"

usage:
  examples:
    - title: "Start Chrome with persistent session"
      code: |
        google-chrome \
          --headless=new \
          --disable-gpu \
          --no-sandbox \
          --disable-dev-shm-usage \
          --remote-debugging-port=9222 \
          --user-data-dir=/a0/usr/workdir/chrome-profile/ \
          https://web.whatsapp.com &
    - title: "Take snapshot of WhatsApp Web"
      code: |
        {
          "tool_name": "chrome_devtools.take_snapshot",
          "tool_args": {}
        }
    - title: "Send message"
      code: |
        {
          "tool_name": "chrome_devtools.fill",
          "tool_args": {
            "uid": "message-input-uid",
            "value": "Your message here"
          }
        }

troubleshooting:
  common_issues:
    - problem: "Chrome doesn't start"
      solution: "Verify that port 9222 is not being used or kill zombie Chrome processes"
    - problem: "Session is lost after reboot"
      solution: "Ensure that --user-data-dir points to a permanent directory"
    - problem: "QR code appears every time"
      solution: "Verify profile directory permissions and disk space"

changelog:
  - version: "1.0.0"
    date: "2026-03-26"
    changes:
      - "Initial plugin version"
      - "Persistent WhatsApp Web session"
      - "Chrome DevTools MCP integration"
      - "Complete documentation"

screenshots:
  - "https://raw.githubusercontent.com/pachuki87/whatsapp-automation/master/whatsapp%20agent%20zero.png"
  - "https://raw.githubusercontent.com/pachuki87/whatsapp-automation/master/thumbnail.jpg"
